<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reimposta Password · Note Spese</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">NS</div>
        <div>
          <div class="login-title">Note Spese</div>
          <div class="login-sub">Reimposta la password</div>
        </div>
      </div>

      <div id="resetForm">
        <div class="form-group" style="margin-top:0">
          <label>Nuova password</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="••••••••" autocomplete="new-password">
            <button type="button" class="btn-eye" onclick="togglePassword()" title="Mostra/nascondi password">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <div id="errorMsg" style="display:none" class="error-msg"></div>
        <div id="successMsg" style="display:none" class="success-msg"></div>
        <button class="btn btn-primary" id="submitBtn" onclick="handleReset()">Reimposta password</button>
        <div class="login-toggle">
          <a href="/login.html">Torna al login</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = `
          <path stroke-linecap="round" stroke-linejoin="round" d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
          <line stroke-linecap="round" stroke-linejoin="round" x1="1" y1="1" x2="23" y2="23"/>`;
      } else {
        input.type = 'password';
        icon.innerHTML = `
          <path stroke-linecap="round" stroke-linejoin="round" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>`;
      }
    }

    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) {
      document.getElementById('errorMsg').textContent = 'Link non valido. Richiedi un nuovo link di recupero.';
      document.getElementById('errorMsg').style.display = 'block';
      document.getElementById('submitBtn').disabled = true;
    }

    async function handleReset() {
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('errorMsg');
      const sucEl = document.getElementById('successMsg');
      errEl.style.display = 'none';
      sucEl.style.display = 'none';

      if (!password) { errEl.textContent = 'Inserisci la nuova password'; errEl.style.display = 'block'; return; }
      if (password.length < 6) { errEl.textContent = 'Password minimo 6 caratteri'; errEl.style.display = 'block'; return; }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Attendere...';

      try {
        const r = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password }),
        });
        const data = await r.json();
        if (r.ok) {
          sucEl.textContent = data.message || 'Password reimpostata. Ora puoi accedere.';
          sucEl.style.display = 'block';
          btn.style.display = 'none';
          setTimeout(() => window.location.href = '/login.html', 3000);
        } else {
          errEl.textContent = data.error || 'Errore sconosciuto';
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Reimposta password';
        }
      } catch (err) {
        errEl.textContent = 'Errore di rete: ' + err.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Reimposta password';
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleReset(); });
  </script>
</body>
</html>
